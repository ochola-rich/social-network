version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: social-network-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_PATH=/app/data/social_network.db
      - GIN_MODE=release
    volumes:
      - sqlite_data:/app/data
    networks:
      - social-network-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: social-network-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
      - PORT=3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - social-network-net
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
    driver: local

networks:
  social-network-net:
    driver: bridge
