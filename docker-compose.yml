version: "3.8"
services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend/data:/root/data
      - ./backend/uploads:/root/uploads
    environment:
      - DB_PATH=./data/social_network.db
      - UPLOAD_DIR=./uploads
    # Allow backend to resolve host.docker.internal if needed
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      # Use host.docker.internal so the frontend container can reach the backend on the host machine
      - NEXT_PUBLIC_API_URL=http://host.docker.internal:8080
      - NEXT_PUBLIC_WS_URL=ws://host.docker.internal:8080/ws
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
