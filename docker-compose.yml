# docker-compose.yml (UPDATED - removed obsolete version attribute)
# Orchestrates the backend and frontend containers for the Social Network application.

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: social-network-backend
    ports:
      - "8080:8080"
    volumes:
      - backend-data:/root/data
      - backend-uploads:/root/uploads
    environment:
      - DB_PATH=./data/social_network.db
      - UPLOAD_DIR=./uploads
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8080
        - NEXT_PUBLIC_WS_URL=ws://localhost:8080/ws
    container_name: social-network-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

volumes:
  backend-data:
    driver: local
  backend-uploads:
    driver: local

networks:
  app-network:
    driver: bridge
